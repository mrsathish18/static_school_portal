<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Bright Future School</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-sidebar {
            width: 260px;
            background: var(--primary);
            color: white;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 30px 20px;
        }

        .admin-main {
            margin-left: 260px;
            padding: 40px;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
        }

        .enquiry-table {
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border-collapse: collapse;
        }

        .enquiry-table th {
            background: #f1f8ff;
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
        }

        .enquiry-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-new { background: #e3f2fd; color: #1976d2; }
        .status-contacted { background: #e8f5e9; color: #2e7d32; }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        /* Logout Overlay Style */
        #logout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }

        .logout-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            color: var(--primary);
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .profile-card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        .profile-avatar {
            position: relative;
            width: 45px;
            height: 45px;
            min-width: 45px;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .online-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background: #22c55e;
            border: 2px solid var(--primary);
            border-radius: 50%;
        }

        .profile-info h4 {
            font-size: 0.9rem;
            margin: 0;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }

        .profile-info p {
            font-size: 0.75rem;
            margin: 0;
            color: rgba(255,255,255,0.6);
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            color: rgba(255,255,255,0.7);
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .sidebar-link i {
            width: 18px;
            height: 18px;
        }

        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .logout-link:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            color: #ff5252 !important;
        }

        .logout-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid var(--accent);
            padding: 3px;
            background: white;
        }

        @media (max-width: 768px) {
            .admin-sidebar { width: 100%; height: auto; position: relative; padding: 20px; }
            .admin-main { margin-left: 0; padding: 20px; }
            .profile-card { margin-bottom: 15px; }
        }
    </style>
    <script>
        // Security Check - Run immediately
        if (sessionStorage.getItem('school_admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            const overlay = document.getElementById('logout-overlay');
            const confirmContent = document.getElementById('logout-confirm-content');
            const progressContent = document.getElementById('logout-progress-content');
            
            // Step 1: Show Confirmation
            overlay.style.display = 'flex';
            confirmContent.style.display = 'block';
            progressContent.style.display = 'none';
        }

        function cancelLogout() {
            document.getElementById('logout-overlay').style.display = 'none';
        }

        function proceedLogout() {
            const username = sessionStorage.getItem('school_admin_username') || 'Staff';
            const confirmContent = document.getElementById('logout-confirm-content');
            const progressContent = document.getElementById('logout-progress-content');
            const msg = document.getElementById('logout-msg');
            
            // Step 2: Show Progress
            confirmContent.style.display = 'none';
            progressContent.style.display = 'block';
            msg.innerText = 'You are logged out now: ' + username;

            sessionStorage.removeItem('school_admin_logged_in');
            sessionStorage.removeItem('school_admin_username');

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
    </script>
</head>

<body>
    <div class="admin-sidebar">
        <h2 style="margin-bottom: 30px; font-size: 1.5rem; letter-spacing: -0.5px;">School Portal</h2>
        
        <!-- Profile Section -->
        <div class="profile-card">
            <div class="profile-avatar">
                <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=80" alt="Admin">
                <div class="online-indicator"></div>
            </div>
            <div class="profile-info">
                <h4 id="user-name-display">Staff Admin</h4>
            </div>
        </div>

        <nav style="margin-top: 40px;">
            <ul style="display: flex; flex-direction: column; gap: 8px;">
                <li><a href="#" class="sidebar-link active"><i data-lucide="database"></i> Enquiries</a></li>
                <li><a href="#" class="sidebar-link" onclick="alert('Portal Settings: Profile, Password and Theme settings coming soon in the next update!')"><i data-lucide="settings"></i> Settings</a></li>
                <li style="margin-top: 20px;"><a href="#" onclick="logout()" class="sidebar-link logout-link"><i data-lucide="power"></i> Logout</a></li>
            </ul>
        </nav>
    </div>

    <main class="admin-main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; flex-wrap: wrap;">
            <h1>Admission enquiries</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <select id="class-filter" onchange="loadEnquiries()" style="padding: 8px 15px; border-radius: 10px; border: 1px solid #ddd; outline: none;">
                    <option value="all">All Classes</option>
                    <option value="LKG">LKG</option>
                    <option value="UKG">UKG</option>
                    <option value="1st Std">1st Std</option>
                    <option value="2nd Std">2nd Std</option>
                    <option value="3rd Std">3rd Std</option>
                    <option value="4th Std">4th Std</option>
                    <option value="5th Std">5th Std</option>
                    <option value="6th Std">6th Std</option>
                    <option value="7th Std">7th Std</option>
                    <option value="8th Std">8th Std</option>
                </select>
                <button class="btn btn-secondary btn-sm" onclick="exportToCSV()">Export to Excel</button>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <small>Total enquiries</small>
                <h2 id="total-count">0</h2>
            </div>
            <div class="stat-card">
                <small>New Applications</small>
                <h2 id="new-count" style="color: var(--secondary)">0</h2>
            </div>
        </div>

        <table class="enquiry-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Student Name</th>
                    <th>Class</th>
                    <th>Contact</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="enquiry-list">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </main>

    <!-- Custom Logout Overlay -->
    <div id="logout-overlay">
        <div class="logout-content">
            <!-- Step 1: Confirmation -->
            <div id="logout-confirm-content">
                <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-1.2.1&auto=format&fit=crop&w=200&q=80" alt="Admin" class="logout-avatar">
                <h2>Are you sure to logout?</h2>
                <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
                    <button class="btn btn-secondary" onclick="cancelLogout()" style="background: #eee; color: #333;">Cancel</button>
                    <button class="btn btn-primary" onclick="proceedLogout()">Logout now</button>
                </div>
            </div>

            <!-- Step 2: Progress -->
            <div id="logout-progress-content" style="display: none;">
                <i data-lucide="log-out" style="width: 48px; height: 48px; color: var(--secondary); margin-bottom: 20px;"></i>
                <h2>Logging out...</h2>
                <p id="logout-msg" style="margin-top: 10px; color: var(--text-muted)"></p>
            </div>
        </div>
    </div>

    <script>
        function loadEnquiries() {
            let enquiries = JSON.parse(localStorage.getItem('school_enquiries') || '[]');
            const list = document.getElementById('enquiry-list');
            const filterValue = document.getElementById('class-filter').value;
            list.innerHTML = '';

            // Update stats based on TOTAL data before filtering
            document.getElementById('total-count').innerText = enquiries.length;
            document.getElementById('new-count').innerText = enquiries.filter(e => e.status === 'New').length;

            // Apply Class Filter
            if (filterValue !== 'all') {
                enquiries = enquiries.filter(e => e.classApplying === filterValue);
            }

            if (enquiries.length === 0) {
                list.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px;">No enquiries found yet.</td></tr>';
                return;
            }

            enquiries.sort((a,b) => b.id - a.id).forEach(enquiry => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${enquiry.date}</td>
                    <td><strong>${enquiry.studentName}</strong></td>
                    <td style="font-weight: 600; color: var(--secondary)">${enquiry.classApplying}</td>
                    <td>${enquiry.parentWhatsapp}</td>
                    <td><span class="status-badge ${enquiry.status === 'New' ? 'status-new' : 'status-contacted'}">${enquiry.status}</span></td>
                    <td>
                        <div style="display: flex; gap: 10px;">
                            <button onclick="toggleStatus(${enquiry.id})" class="btn btn-secondary btn-sm">
                                ${enquiry.status === 'New' ? 'Mark Contacted' : 'Reset'}
                            </button>
                            <button onclick="deleteEnquiry(${enquiry.id})" class="btn btn-sm" style="color: #d32f2f;">
                                <i data-lucide="trash-2" style="width: 14px;"></i>
                            </button>
                        </div>
                    </td>
                `;
                list.appendChild(tr);
            });
            if (window.lucide) lucide.createIcons();
        }

        function toggleStatus(id) {
            let enquiries = JSON.parse(localStorage.getItem('school_enquiries') || '[]');
            enquiries = enquiries.map(e => {
                if (e.id === id) {
                    e.status = e.status === 'New' ? 'Contacted' : 'New';
                }
                return e;
            });
            localStorage.setItem('school_enquiries', JSON.stringify(enquiries));
            loadEnquiries();
        }

        function deleteEnquiry(id) {
            if (confirm('Are you sure you want to delete this enquiry?')) {
                let enquiries = JSON.parse(localStorage.getItem('school_enquiries') || '[]');
                enquiries = enquiries.filter(e => e.id !== id);
                localStorage.setItem('school_enquiries', JSON.stringify(enquiries));
                loadEnquiries();
            }
        }

        function exportToCSV() {
            const enquiries = JSON.parse(localStorage.getItem('school_enquiries') || '[]');
            if(enquiries.length === 0) return alert('No data to export');
            
            let csv = 'Date,Student Name,Class,Contact,Status\n';
            enquiries.forEach(e => {
                csv += `${e.date},${e.studentName},${e.classApplying},${e.parentWhatsapp},${e.status}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'Admission Enquiries.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        window.onload = () => {
            let enquiries = JSON.parse(localStorage.getItem('school_enquiries') || '[]');
            
            // Mark all as Read when admin views the list
            let hasUnread = false;
            enquiries = enquiries.map(e => {
                if (e.isRead === false) {
                    e.isRead = true;
                    hasUnread = true;
                }
                return e;
            });
            
            if (hasUnread) {
                localStorage.setItem('school_enquiries', JSON.stringify(enquiries));
            }

            loadEnquiries();
            // Load User Profile Name
            const username = sessionStorage.getItem('school_admin_username') || 'Staff Admin';
            const display = document.getElementById('user-name-display');
            if (display) display.innerText = username;
        };
    </script>
</body>

</html>
