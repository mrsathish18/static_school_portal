<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Bright Future School</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: #f0f7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-header {
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: var(--primary);
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        .error-msg {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header id="header" class="scrolled always-scrolled">
        <div class="container nav-container">
            <a href="/" class="logo">BRIGHT FUTURE <span style="color: var(--secondary)">SCHOOL</span></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/about.html">About</a></li>
                    <li><a href="/facilities.html">Facilities</a></li>
                    <li><a href="/gallery.html">Gallery</a></li>
                    <li><a href="/admission.html">Admission</a></li>
                    <li><a href="/contact.html">Contact</a></li>
                </ul>
                <div class="mobile-toggle" id="mobile-menu-btn">
                    <i data-lucide="menu"></i>
                </div>
            </nav>
        </div>
    </header>
    <script type="module" src="/main.js"></script>

    <a href="javascript:history.back()" class="back-link" title="Go Back" style="top: 100px; left: 30px;">
        <i data-lucide="arrow-left"></i>
    </a>

    <div class="login-card">
        <div class="login-header">
            <h1 class="logo" style="font-size: 1.5rem;">BRIGHT <span style="color: var(--secondary)">FUTURE</span></h1>
            <h2>Staff Portal</h2>
            <p>Please enter your credentials</p>
        </div>

        <div id="error" class="error-msg">Invalid username or password.</div>

        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group" style="position: relative;">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="Enter password" required style="padding-right: 50px;">
                    <button type="button" id="togglePassword" style="position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;">
                        <i data-lucide="eye-off" style="color: #777; width: 20px; height: 20px;"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login to Portal</button>
        </form>
        
        <script>
            // Use event delegation or persistent button wrapper
            const togglePasswordBtn = document.querySelector('#togglePassword');
            const passwordInput = document.querySelector('#password');

            togglePasswordBtn.addEventListener('click', function () {
                // Toggle the type attribute
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Toggle the icon (target either <i> or <svg>)
                const icon = this.querySelector('i, svg');
                icon.setAttribute('data-lucide', type === 'password' ? 'eye-off' : 'eye');
                
                // Re-render icons
                if (window.lucide) lucide.createIcons();
            });

            // Initialize icons on load
            if (window.lucide) lucide.createIcons();
        </script>
        
        <div style="margin-top: 25px;">
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simple mock authentication
            if (user === 'admin' && pass === 'admin123') {
                sessionStorage.setItem('school_admin_logged_in', 'true');
                sessionStorage.setItem('school_admin_username', user);
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
